# super-harness policy (see sensor-gate-architecture §2.4)

# Reviewer strategy + source policy. super-harness never runs the review itself;
# sources are configured labels that the CLI validates when verdicts are recorded.
reviewers:
  sources:
    subagent:
      agent: task-subagent
      context: incremental
      instructions: "Dispatch an independent reviewer subagent against the current plan/review bundle or latest delta."
      agent_options:
        effort: medium
    external:
      agent: codex
      context: bundle-only
      instructions: "Run codex exec --sandbox read-only against the prepared plan or review bundle."
      agent_options:
        reasoning_effort: medium
        sandbox: read-only
    human:
      agent: human
      context: incremental
  plan-reviewer:
    strategy: subagent
    min_independent: 2
  code-reviewer:
    strategy: subagent
    min_independent: 2
