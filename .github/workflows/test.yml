name: test
on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
        # macOS runners bill at ~10x Linux minutes. Most failures are either
        # version-specific (covered by the full Linux matrix) or platform-
        # specific (surface at the version extremes). So macOS tests only the
        # two ends — 3.10 (min supported) + 3.13 (latest) — skipping the
        # redundant middle versions. Linux keeps full version coverage.
        exclude:
          - os: macos-latest
            python: "3.11"
          - os: macos-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest (excluding e2e ship-gate)
        # The @pytest.mark.e2e full-lifecycle test runs in a dedicated job
        # below (Ubuntu + Py3.12 only) to save CI time. The pre-tool-use
        # E2E test under tests/e2e/ is intentionally unmarked and continues
        # to run on every matrix slot — it's been stable since Phase 5 and
        # exercises platform-specific daemon + hook subprocess code that
        # benefits from broad coverage.
        run: pytest -v -m "not e2e"

  e2e:
    # Phase 16 v0.1 ship gate: full lifecycle E2E (real daemon, real hook
    # binary, real local git, only `gh` PATH-shimmed). One slot only —
    # the test exercises platform-agnostic wiring, not platform-specific
    # primitives, so matrix coverage is overkill.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest (e2e ship-gate only)
        run: pytest -v -m "e2e"
