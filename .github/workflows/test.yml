name: test
on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v
